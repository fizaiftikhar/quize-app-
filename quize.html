<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-[420px]">

        <!-- Header -->
        <div class="flex justify-between text-sm text-gray-600 mb-4">
            <div>
                Question <span id="CurrentQuestion">1</span> /
                <span id="totalQuestion">0</span>
            </div>
            <div>
                Score: <span id="score">0</span>
            </div>
        </div>

        <!-- Question -->
        <p id="displayQuestion" class="text-lg font-semibold mb-4">
            Question will appear here
        </p>

        <!-- Options -->
        <div id="OptionContainer" class="grid grid-cols-2 gap-2">
            <!-- Options JS se yahan aayen ge -->
        </div>

    </div>

    <!-- JavaScript -->
    <script src="app.js"></script>
</body>
</html>
